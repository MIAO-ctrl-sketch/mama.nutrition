<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孕期 AI 智慧管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff9fa; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); }
        .gradient-main { background: linear-gradient(135deg, #ff8a92 0%, #ffc1cc 100%); }
        .alert-pulse { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.5); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-32">

    <!-- 1. 教學與初始設置 (僅第一次顯示) -->
    <div id="setup-screen" class="fixed inset-0 z-[100] bg-white overflow-y-auto hidden">
        <div class="p-8 max-w-md mx-auto">
            <h1 class="text-4xl font-black text-pink-500 mb-2">Hello! 媽咪</h1>
            <p class="text-gray-400 text-sm mb-8 font-medium">我們將根據醫學指引為您量身打造飲食計畫。</p>
            
            <div class="bg-blue-50 p-5 rounded-3xl mb-8 space-y-3">
                <h3 class="font-bold text-blue-700 flex items-center gap-2">
                    <span>📘 操作說明</span>
                </h3>
                <ul class="text-xs text-blue-600/80 space-y-2 leading-relaxed">
                    <li>• <b>體重監測：</b>系統會根據您的 BMI 判斷每週增重是否達標。</li>
                    <li>• <b>AI 辨識：</b>拍照即可自動計算熱量，不需手動查詢。</li>
                    <li>• <b>代換建議：</b>若攝取過量，AI 會在下方提醒您如何優化下一餐。</li>
                </ul>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="text-xs font-black text-gray-500 uppercase tracking-widest">身高與孕前體重 (cm / kg)</label>
                    <div class="grid grid-cols-2 gap-4 mt-2">
                        <input id="in-h" type="number" placeholder="160" class="w-full bg-gray-50 rounded-2xl p-4 outline-none border focus:border-pink-300">
                        <input id="in-w" type="number" placeholder="55" class="w-full bg-gray-50 rounded-2xl p-4 outline-none border focus:border-pink-300">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-black text-gray-500 uppercase tracking-widest">目前體重 (kg)</label>
                        <input id="in-cw" type="number" placeholder="56" class="w-full bg-gray-50 rounded-2xl p-4 mt-2 outline-none border focus:border-pink-300">
                    </div>
                    <div>
                        <label class="text-xs font-black text-gray-500 uppercase tracking-widest">目前週數 (1-40)</label>
                        <input id="in-week" type="number" placeholder="12" class="w-full bg-gray-50 rounded-2xl p-4 mt-2 outline-none border focus:border-pink-300">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-black text-gray-500 uppercase tracking-widest">日常活動水平</label>
                    <select id="in-act" class="w-full bg-gray-50 rounded-2xl p-4 mt-2 outline-none border appearance-none font-bold">
                        <option value="1.2">久坐不動 (辦公室/休養中)</option>
                        <option value="1.375" selected>輕度活動 (輕家事/散步)</option>
                        <option value="1.55">中度活動 (規律運動/家務多)</option>
                    </select>
                </div>
                <button onclick="startApp()" class="w-full bg-pink-500 text-white py-5 rounded-3xl font-black text-lg shadow-xl shadow-pink-200 active:scale-95 transition-all">開始紀錄</button>
            </div>
        </div>
    </div>

    <!-- 主頁面架構 -->
    <div id="main-app" class="max-w-md mx-auto p-6 space-y-6">
        <!-- 頂部資訊 -->
        <header class="flex justify-between items-end">
            <div>
                <span id="display-week" class="text-pink-500 font-black text-xs bg-pink-50 px-3 py-1 rounded-full uppercase">第 12 週</span>
                <h2 class="text-3xl font-black text-gray-800 mt-1">健康儀表板</h2>
            </div>
            <button onclick="exportRecord()" class="bg-white p-3 rounded-2xl shadow-sm text-gray-400 active:bg-gray-50">匯出</button>
        </header>

        <!-- 體重警示與熱量 -->
        <div id="stat-card" class="gradient-main card rounded-[40px] p-8 text-white shadow-2xl relative overflow-hidden">
            <div id="weight-warning" class="hidden absolute top-0 left-0 right-0 bg-red-600 text-[10px] text-center py-2 font-black uppercase tracking-widest">⚠️ 警告：體重增速超過醫學建議範圍</div>
            
            <div class="mb-6">
                <p class="text-xs font-bold opacity-80 mb-2">今日建議攝取熱量 (TDEE + 孕補)</p>
                <div class="flex items-baseline gap-2">
                    <span id="total-consumed" class="text-6xl font-black">0</span>
                    <span class="text-xl font-bold opacity-70">/ <span id="target-total">--</span> kcal</span>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-4 text-center border-t border-white/20 pt-6">
                <div>
                    <p class="text-[10px] font-bold opacity-70 mb-1">早餐</p>
                    <p id="cal-b" class="font-black">0</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold opacity-70 mb-1">午餐</p>
                    <p id="cal-l" class="font-black text-xl">0</p>
                </div>
                <div>
                    <p class="text-[10px] font-bold opacity-70 mb-1">晚餐</p>
                    <p id="cal-d" class="font-black">0</p>
                </div>
            </div>
        </div>

        <!-- 媽咪智慧小提醒 (AI 回傳建議顯示區) -->
        <div id="ai-tip-box" class="bg-white p-6 rounded-[32px] shadow-sm border-l-[12px] border-pink-400 transition-all duration-500">
            <div class="flex items-start gap-4">
                <div class="bg-pink-100 p-3 rounded-2xl text-2xl">🤰</div>
                <div>
                    <h4 id="tip-title" class="font-black text-gray-800 mb-1">今日媽咪小叮嚀</h4>
                    <p id="tip-content" class="text-xs text-gray-500 leading-relaxed">點擊下方按鈕拍照，我會幫您分析營養並給予建議喔！</p>
                </div>
            </div>
        </div>

        <!-- 錄入區 -->
        <section class="bg-white p-6 rounded-[40px] shadow-sm space-y-6">
            <div class="flex justify-between items-center">
                <h3 class="font-black text-gray-700">飲食記錄錄入</h3>
                <select id="meal-select" class="bg-gray-50 px-4 py-2 rounded-xl text-xs font-black outline-none border-none">
                    <option value="breakfast">早 餐</option>
                    <option value="lunch" selected>午 餐</option>
                    <option value="dinner">晚 餐</option>
                </select>
            </div>

            <!-- AI 辨識區 -->
            <label class="block relative group cursor-pointer">
                <input id="image-input" type="file" accept="image/*" class="hidden" onchange="handleAIIdentification(event)">
                <div id="upload-ui" class="border-4 border-dashed border-gray-50 bg-gray-50/50 rounded-[40px] p-10 flex flex-col items-center justify-center transition-all group-active:scale-95">
                    <div id="idle-ui" class="text-center">
                        <div class="bg-white w-16 h-16 rounded-full flex items-center justify-center shadow-lg mx-auto mb-4 text-3xl">📸</div>
                        <p class="text-sm font-black text-gray-400">拍照智慧辨識熱量</p>
                    </div>
                    <div id="loading-ui" class="hidden text-center">
                        <div class="w-12 h-12 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin mx-auto mb-4"></div>
                        <p class="text-sm font-black text-pink-500">AI 正在嚴謹分析中...</p>
                    </div>
                    <img id="image-preview" class="hidden w-full h-48 object-cover rounded-3xl shadow-lg">
                </div>
            </label>

            <!-- 待存結果 -->
            <div id="pending-ui" class="hidden space-y-4 border-t pt-6">
                <div id="pending-items" class="flex flex-wrap gap-2"></div>
                <button onclick="commitMeal()" class="w-full bg-gray-900 text-white py-5 rounded-3xl font-black shadow-xl active:scale-95 transition-all">確認存入今日紀錄</button>
            </div>

            <!-- 手動補充 -->
            <div class="flex gap-2">
                <input id="manual-n" type="text" placeholder="食物/醬料" class="flex-1 bg-gray-50 px-4 py-3 rounded-2xl text-xs outline-none">
                <input id="manual-c" type="number" placeholder="熱量" class="w-20 bg-gray-50 px-4 py-3 rounded-2xl text-xs outline-none">
                <button onclick="addManual()" class="bg-gray-100 px-4 py-3 rounded-2xl font-black text-gray-400 text-xs">手動加</button>
            </div>
        </section>

        <!-- 管理與設定 -->
        <div class="flex gap-4">
            <button onclick="showHistory()" class="flex-1 bg-white p-6 rounded-[32px] shadow-sm text-center active:scale-95 transition-all">
                <p class="text-[10px] font-black text-gray-400 mb-1">今日明細</p>
                <p class="font-black text-gray-700">檢視與刪除</p>
            </button>
            <button onclick="openSettings()" class="flex-1 bg-white p-6 rounded-[32px] shadow-sm text-center active:scale-95 transition-all">
                <p class="text-[10px] font-black text-gray-400 mb-1">每週更新</p>
                <p class="font-black text-gray-700">體重紀錄</p>
            </button>
        </div>
    </div>

    <!-- 歷史清單彈窗 -->
    <div id="modal-history" class="fixed inset-0 z-[110] glass flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[48px] p-8 shadow-2xl space-y-6">
            <h2 class="text-2xl font-black text-gray-800">今日紀錄詳情</h2>
            <div id="history-content" class="space-y-4 max-h-[60vh] overflow-y-auto hide-scrollbar"></div>
            <button onclick="closeModal('modal-history')" class="w-full py-4 bg-gray-100 rounded-2xl font-black text-gray-400">關閉視窗</button>
        </div>
    </div>

    <!-- 體重更新彈窗 -->
    <div id="modal-settings" class="fixed inset-0 z-[110] glass flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[48px] p-8 shadow-2xl space-y-6">
            <h2 class="text-2xl font-black text-gray-800">更新孕期體重</h2>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-gray-400">目前體重 (kg)</label>
                    <input id="up-cw" type="number" class="w-full bg-gray-50 p-4 rounded-2xl mt-1 outline-none">
                </div>
                <div>
                    <label class="text-[10px] font-black text-gray-400">目前週數</label>
                    <input id="up-week" type="number" class="w-full bg-gray-50 p-4 rounded-2xl mt-1 outline-none">
                </div>
            </div>
            <button onclick="updateHealth()" class="w-full py-5 bg-pink-500 text-white rounded-[32px] font-black shadow-lg">保存並重新計算</button>
            <button onclick="closeModal('modal-settings')" class="w-full py-2 text-gray-300 text-xs font-black">取消</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // 使用環境自動提供的 API Key
        
        let db = JSON.parse(localStorage.getItem('mom_ai_v8')) || {
            isSetup: false,
            date: new Date().toLocaleDateString(),
            settings: { h: 160, w: 55, cw: 56, week: 12, activity: 1.375 },
            target: 1800,
            meals: {
                breakfast: { items: [], total: 0 },
                lunch: { items: [], total: 0 },
                dinner: { items: [], total: 0 }
            }
        };

        let tempItems = [];

        function save() {
            localStorage.setItem('mom_ai_v8', JSON.stringify(db));
            updateUI();
        }

        // --- 核心計算邏輯 (更嚴謹的醫學模型) ---
        function calculateRequirements() {
            const { h, w, cw, week, activity } = db.settings;
            
            // 1. 計算 BMI 決定增重建議 (孕前)
            const bmi = w / ((h / 100) ** 2);
            let weeklyGainLimit = 0.45; // 正常體型
            if (bmi < 18.5) weeklyGainLimit = 0.55; // 過輕
            else if (bmi >= 24 && bmi < 27) weeklyGainLimit = 0.35; // 過重
            else if (bmi >= 27) weeklyGainLimit = 0.25; // 肥胖

            // 2. Mifflin-St Jeor BMR 公式
            // BMR = 10*weight + 6.25*height - 5*age - 161
            // 假設平均年齡 30
            const bmr = (10 * w) + (6.25 * h) - (5 * 30) - 161;
            let tdee = bmr * activity;

            // 3. 孕期加成 (國健署建議)
            let surplus = 0;
            if (week >= 13 && week <= 28) surplus = 300;
            else if (week > 28) surplus = 450;
            
            db.target = Math.round(tdee + surplus);
            
            // 4. 體重增長檢查
            const totalGain = cw - w;
            const avgWeeklyGain = week > 0 ? (totalGain / week) : 0;
            const warningEl = document.getElementById('weight-warning');
            const cardEl = document.getElementById('stat-card');
            
            if (week > 12 && avgWeeklyGain > weeklyGainLimit) {
                warningEl.classList.remove('hidden');
                cardEl.classList.add('alert-pulse');
            } else {
                warningEl.classList.add('hidden');
                cardEl.classList.remove('alert-pulse');
            }
        }

        // --- AI 辨識邏輯 (修正版) ---
        async function handleAIIdentification(e) {
            const file = e.target.files[0];
            if (!file) return;

            // UI 狀態切換
            document.getElementById('idle-ui').classList.add('hidden');
            document.getElementById('loading-ui').classList.remove('hidden');
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('pending-ui').classList.add('hidden');

            const reader = new FileReader();
            reader.onload = async (evt) => {
                const base64Data = evt.target.result.split(',')[1];
                document.getElementById('image-preview').src = evt.target.result;
                document.getElementById('image-preview').classList.remove('hidden');

                try {
                    await callGeminiVision(base64Data);
                } catch (err) {
                    console.error("AI Error:", err);
                    updateTip("⚠️ 分析失敗", "AI 目前忙碌中，請手動輸入食物或稍後再試。", true);
                } finally {
                    document.getElementById('loading-ui').classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        async function callGeminiVision(base64) {
            const systemPrompt = `你是一位專業的孕期營養師。
            請分析這張照片中的食物，並回傳嚴格的 JSON 格式：
            {
              "items": [{"name": "食物名稱", "cal": 熱量數字, "gi": "low/mid/high"}],
              "dietary_tip": "給媽咪的一句話建議，若熱量過高請提供具體的低GI代換食物",
              "is_excessive": true/false
            }`;

            const payload = {
                contents: [{
                    parts: [
                        { text: systemPrompt },
                        { inlineData: { mimeType: "image/png", data: base64 } }
                    ]
                }],
                generationConfig: { responseMimeType: "application/json" }
            };

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            const rawOutput = result.candidates[0].content.parts[0].text;
            
            // 安全提取 JSON
            const jsonMatch = rawOutput.match(/\{[\s\S]*\}/);
            if (!jsonMatch) throw new Error("Invalid AI Response");
            
            const data = JSON.parse(jsonMatch[0]);

            tempItems = data.items.map(i => ({
                id: Date.now() + Math.random(),
                name: i.name,
                cal: i.cal,
                isLowGI: i.gi === 'low'
            }));

            renderTemp();
            updateTip(data.is_excessive ? "🚨 營養代換建議" : "✅ 營養師點評", data.dietary_tip, data.is_excessive);
            document.getElementById('pending-ui').classList.remove('hidden');
        }

        // --- UI 更新與互動 ---
        function updateUI() {
            const { breakfast, lunch, dinner } = db.meals;
            const consumed = breakfast.total + lunch.total + dinner.total;
            
            document.getElementById('total-consumed').innerText = consumed;
            document.getElementById('target-total').innerText = db.target;
            document.getElementById('cal-b').innerText = breakfast.total;
            document.getElementById('cal-l').innerText = lunch.total;
            document.getElementById('cal-d').innerText = dinner.total;
            document.getElementById('display-week').innerText = `第 ${db.settings.week} 週`;
        }

        function renderTemp() {
            const container = document.getElementById('pending-items');
            container.innerHTML = tempItems.map(item => `
                <div class="bg-pink-50 border border-pink-100 px-4 py-2 rounded-2xl flex items-center gap-3">
                    <span class="text-xs font-black text-pink-600">${item.name} <span class="opacity-50">${item.cal}k</span></span>
                    <button onclick="removeTemp(${item.id})" class="text-pink-300">✕</button>
                </div>
            `).join('');
        }

        function removeTemp(id) {
            tempItems = tempItems.filter(i => i.id !== id);
            renderTemp();
            if (tempItems.length === 0) document.getElementById('pending-ui').classList.add('hidden');
        }

        function commitMeal() {
            const type = document.getElementById('meal-select').value;
            db.meals[type].items.push(...tempItems);
            db.meals[type].total = db.meals[type].items.reduce((s, i) => s + i.cal, 0);
            
            tempItems = [];
            document.getElementById('pending-ui').classList.add('hidden');
            document.getElementById('image-preview').classList.add('hidden');
            document.getElementById('idle-ui').classList.remove('hidden');
            
            save();
            alert("已存入今日結算紀錄！");
        }

        function addManual() {
            const n = document.getElementById('manual-n').value;
            const c = parseInt(document.getElementById('manual-c').value);
            if (!n || isNaN(c)) return;
            
            tempItems.push({ id: Date.now(), name: n, cal: c, isLowGI: false });
            renderTemp();
            document.getElementById('pending-ui').classList.remove('hidden');
            document.getElementById('manual-n').value = '';
            document.getElementById('manual-c').value = '';
        }

        function updateTip(title, content, isAlert) {
            const box = document.getElementById('ai-tip-box');
            document.getElementById('tip-title').innerText = title;
            document.getElementById('tip-content').innerText = content;
            box.style.borderColor = isAlert ? '#ef4444' : '#f472b6';
        }

        function showHistory() {
            const container = document.getElementById('history-content');
            const meals = { breakfast: '🌅 早餐', lunch: '☀️ 午餐', dinner: '🌙 晚餐' };
            
            let html = '';
            for (let [key, label] of Object.entries(meals)) {
                html += `
                    <div class="bg-gray-50 p-5 rounded-[32px]">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-black text-gray-400 text-xs uppercase">${label}</span>
                            <span class="font-black text-pink-500">${db.meals[key].total} kcal</span>
                        </div>
                        <div class="space-y-2">
                            ${db.meals[key].items.map(item => `
                                <div class="bg-white p-3 rounded-xl flex justify-between items-center shadow-sm">
                                    <span class="text-xs font-bold">${item.name} (${item.cal}k)</span>
                                    <button onclick="deleteItem('${key}', ${item.id})" class="text-red-300 text-[10px] font-black">刪除</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html || '<p class="text-center text-gray-400 py-10">今日尚無紀錄</p>';
            showModal('modal-history');
        }

        function deleteItem(type, id) {
            db.meals[type].items = db.meals[type].items.filter(i => i.id !== id);
            db.meals[type].total = db.meals[type].items.reduce((s, i) => s + i.cal, 0);
            save();
            showHistory();
        }

        function startApp() {
            db.settings.h = parseFloat(document.getElementById('in-h').value) || 160;
            db.settings.w = parseFloat(document.getElementById('in-w').value) || 55;
            db.settings.cw = parseFloat(document.getElementById('in-cw').value) || 55;
            db.settings.week = parseInt(document.getElementById('in-week').value) || 1;
            db.settings.activity = parseFloat(document.getElementById('in-act').value);
            db.isSetup = true;
            calculateRequirements();
            save();
            document.getElementById('setup-screen').classList.add('hidden');
        }

        function openSettings() {
            document.getElementById('up-cw').value = db.settings.cw;
            document.getElementById('up-week').value = db.settings.week;
            showModal('modal-settings');
        }

        function updateHealth() {
            db.settings.cw = parseFloat(document.getElementById('up-cw').value);
            db.settings.week = parseInt(document.getElementById('up-week').value);
            calculateRequirements();
            save();
            closeModal('modal-settings');
        }

        function exportRecord() {
            const consumed = db.meals.breakfast.total + db.meals.lunch.total + db.meals.dinner.total;
            const rows = [
                ["項目", "數值"],
                ["日期", db.date],
                ["目前週數", db.settings.week],
                ["目前體重", db.settings.cw + " kg"],
                ["目標熱量", db.target + " kcal"],
                ["今日攝取總量", consumed + " kcal"],
                ["早餐熱量", db.meals.breakfast.total],
                ["午餐熱量", db.meals.lunch.total],
                ["晚餐熱量", db.meals.dinner.total]
            ];
            const csv = "\ufeff" + rows.map(r => r.join(",")).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `孕期紀錄_${db.date}.csv`;
            a.click();
        }

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // 初始化
        window.onload = () => {
            if (!db.isSetup) document.getElementById('setup-screen').classList.remove('hidden');
            if (db.date !== new Date().toLocaleDateString()) {
                db.date = new Date().toLocaleDateString();
                db.meals = { breakfast: { items: [], total: 0 }, lunch: { items: [], total: 0 }, dinner: { items: [], total: 0 } };
            }
            calculateRequirements();
            updateUI();
        };
    </script>
</body>
</html>
