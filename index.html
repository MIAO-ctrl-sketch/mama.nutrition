<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孕期 AI 營養助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;500;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fff9fa; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .gradient-bg { background: linear-gradient(135deg, #ff8da1 0%, #ffc1cc 100%); }
        .pulse-warn { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body class="pb-36">

    <!-- 初始設定畫面 -->
    <div id="setup-screen" class="fixed inset-0 z-[100] bg-white overflow-y-auto hidden">
        <div class="p-8 max-w-md mx-auto">
            <h1 class="text-4xl font-black text-pink-500 mb-6">歡迎媽咪！</h1>
            <div class="bg-pink-50 p-5 rounded-3xl mb-8">
                <p class="text-xs text-pink-700 leading-relaxed font-medium">
                    本系統採用 <b>Mifflin-St Jeor</b> 公式計算基礎代謝，並依據衛生福利部國健署建議，針對孕期三階段提供精確的營養補貼計畫。
                </p>
            </div>

            <div class="space-y-5">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 ml-2">身高 (cm)</label>
                        <input id="in-h" type="number" placeholder="160" class="w-full bg-gray-50 rounded-2xl p-4 outline-none border focus:border-pink-300">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 ml-2">孕前體重 (kg)</label>
                        <input id="in-w" type="number" placeholder="55" class="w-full bg-gray-50 rounded-2xl p-4 outline-none border focus:border-pink-300">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 ml-2">目前體重 (kg)</label>
                        <input id="in-cw" type="number" placeholder="56" class="w-full bg-gray-50 rounded-2xl p-4 outline-none border focus:border-pink-300">
                    </div>
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-gray-400 ml-2">目前週數 (1-40)</label>
                        <input id="in-week" type="number" placeholder="12" class="w-full bg-gray-50 rounded-2xl p-4 outline-none border focus:border-pink-300">
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] font-black text-gray-400 ml-2">活動量</label>
                    <select id="in-act" class="w-full bg-gray-50 rounded-2xl p-4 outline-none border appearance-none font-bold">
                        <option value="1.2">久坐不動</option>
                        <option value="1.375" selected>輕度活動 (日常家事)</option>
                        <option value="1.55">中度活動 (規律運動)</option>
                    </select>
                </div>
                <button onclick="saveSetup()" class="w-full bg-pink-500 text-white py-5 rounded-3xl font-black text-lg shadow-xl active:scale-95 transition-all">開始智慧健康管理</button>
            </div>
        </div>
    </div>

    <!-- 主頁面 -->
    <div id="app" class="max-w-md mx-auto p-6 space-y-6">
        <header class="flex justify-between items-end">
            <div>
                <span id="label-week" class="bg-pink-100 text-pink-600 px-3 py-1 rounded-full text-[10px] font-black">第 12 週</span>
                <h1 class="text-3xl font-black text-gray-800 mt-1 tracking-tighter">孕期營養管家</h1>
            </div>
            <button onclick="resetData()" class="text-[10px] font-bold text-gray-300">重設今日</button>
        </header>

        <!-- 狀態儀表板 -->
        <div id="stat-card" class="gradient-bg rounded-[40px] p-8 text-white shadow-2xl relative overflow-hidden transition-all duration-500">
            <div id="weight-warn" class="hidden absolute top-0 left-0 right-0 bg-red-600 text-[10px] text-center py-2 font-black uppercase">⚠️ 體重異常：每週增長過快</div>
            
            <div class="relative z-10">
                <p class="text-xs font-bold opacity-80 mb-1">今日熱量攝取進度</p>
                <div class="flex items-baseline gap-2">
                    <span id="disp-consumed" class="text-6xl font-black">0</span>
                    <span class="text-xl font-bold opacity-60">/ <span id="disp-target">1800</span> kcal</span>
                </div>
            </div>

            <div class="mt-8 grid grid-cols-3 gap-2 border-t border-white/20 pt-6">
                <div class="text-center border-r border-white/10">
                    <p class="text-[9px] opacity-70 mb-1">早餐</p>
                    <p id="sum-b" class="font-bold">0</p>
                </div>
                <div class="text-center border-r border-white/10">
                    <p class="text-[9px] opacity-70 mb-1">午餐</p>
                    <p id="sum-l" class="font-bold text-lg">0</p>
                </div>
                <div class="text-center">
                    <p class="text-[9px] opacity-70 mb-1">晚餐</p>
                    <p id="sum-d" class="font-bold">0</p>
                </div>
            </div>
        </div>

        <!-- AI 建議區 -->
        <div id="ai-suggestion" class="bg-white p-6 rounded-[32px] shadow-sm border-l-8 border-pink-400">
            <div class="flex gap-4">
                <div class="text-3xl">🥦</div>
                <div>
                    <h3 class="font-black text-gray-800 text-sm" id="sug-title">媽咪智慧分析</h3>
                    <p class="text-xs text-gray-500 leading-relaxed mt-1" id="sug-body">請拍攝您的餐點，AI 將為您分析熱量與代換方案。</p>
                </div>
            </div>
        </div>

        <!-- 錄入區 -->
        <div class="bg-white p-6 rounded-[40px] shadow-sm space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="font-black text-gray-700">飲食錄入</h2>
                <select id="meal-type" class="text-xs bg-gray-50 px-4 py-2 rounded-xl font-bold border-none outline-none">
                    <option value="breakfast">早餐</option>
                    <option value="lunch" selected>午餐</option>
                    <option value="dinner">晚餐</option>
                </select>
            </div>

            <!-- 照片上傳 -->
            <label class="block relative">
                <input type="file" accept="image/*" class="hidden" onchange="startAIPocess(event)">
                <div id="drop-zone" class="bg-gray-50/50 border-4 border-dashed border-gray-100 rounded-[40px] p-10 flex flex-col items-center justify-center min-h-[180px] active:scale-95 transition-all">
                    <div id="ui-idle">
                        <div class="bg-white w-16 h-16 rounded-3xl flex items-center justify-center shadow-lg mx-auto mb-4">📸</div>
                        <p class="text-xs font-black text-gray-400">點擊拍照辨識熱量</p>
                    </div>
                    <div id="ui-loading" class="hidden text-center">
                        <div class="w-12 h-12 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin mx-auto mb-4"></div>
                        <p class="text-xs font-black text-pink-500">AI 正嚴謹計算中...</p>
                    </div>
                    <img id="prev-img" class="hidden w-full h-48 object-cover rounded-3xl shadow-md">
                </div>
            </label>

            <!-- AI 辨識後結果 -->
            <div id="ai-results" class="hidden space-y-4 border-t pt-4">
                <div id="temp-items" class="flex flex-wrap gap-2"></div>
                <button onclick="confirmMeal()" class="w-full bg-gray-900 text-white py-5 rounded-3xl font-black shadow-lg">存入今日飲食紀錄</button>
            </div>

            <!-- 手動補充 -->
            <div class="flex gap-2">
                <input id="man-name" type="text" placeholder="食物名稱" class="flex-1 bg-gray-50 p-4 rounded-2xl text-xs outline-none">
                <input id="man-cal" type="number" placeholder="熱量" class="w-20 bg-gray-50 p-4 rounded-2xl text-xs outline-none">
                <button onclick="addManual()" class="bg-pink-100 text-pink-500 px-5 rounded-2xl font-black text-xs">加</button>
            </div>
        </div>

        <!-- 功能底欄 -->
        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/90 glass-card p-4 rounded-[32px] shadow-2xl flex justify-around items-center z-50">
            <button onclick="showHistory()" class="flex flex-col items-center text-gray-400">
                <span class="text-xl">📊</span>
                <span class="text-[9px] font-black mt-1 uppercase">明細</span>
            </button>
            <button onclick="document.querySelector('input[type=file]').click()" class="bg-pink-500 text-white p-5 rounded-[28px] -mt-12 shadow-xl border-4 border-white active:scale-90 transition-all">📸</button>
            <button onclick="openSettings()" class="flex flex-col items-center text-gray-400">
                <span class="text-xl">⚙️</span>
                <span class="text-[9px] font-black mt-1 uppercase">設定</span>
            </button>
        </div>
    </div>

    <!-- 彈窗內容 -->
    <div id="modal-container" class="fixed inset-0 z-[120] bg-black/60 backdrop-blur-sm flex items-end sm:items-center justify-center p-4 hidden">
        <div class="bg-white w-full max-w-md rounded-[40px] p-8 space-y-6">
            <h2 id="modal-title" class="text-2xl font-black text-gray-800">歷史紀錄</h2>
            <div id="modal-body" class="max-h-[50vh] overflow-y-auto space-y-3 px-2"></div>
            <button onclick="closeModal()" class="w-full bg-gray-100 py-4 rounded-2xl font-black text-gray-400">關閉</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // 系統自動注入

        let state = JSON.parse(localStorage.getItem('mom_v10')) || {
            setup: false,
            date: new Date().toLocaleDateString(),
            settings: { h: 160, w: 55, cw: 56, week: 12, activity: 1.375 },
            targetCal: 1800,
            meals: {
                breakfast: { list: [], sum: 0 },
                lunch: { list: [], sum: 0 },
                dinner: { list: [], sum: 0 }
            }
        };

        let currentTempItems = [];

        function saveState() {
            localStorage.setItem('mom_v10', JSON.stringify(state));
            refreshUI();
        }

        function refreshUI() {
            const consumed = state.meals.breakfast.sum + state.meals.lunch.sum + state.meals.dinner.sum;
            document.getElementById('disp-consumed').innerText = consumed;
            document.getElementById('disp-target').innerText = state.targetCal;
            document.getElementById('sum-b').innerText = state.meals.breakfast.sum;
            document.getElementById('sum-l').innerText = state.meals.lunch.sum;
            document.getElementById('sum-d').innerText = state.meals.dinner.sum;
            document.getElementById('label-week').innerText = `第 ${state.settings.week} 週`;
            
            // 體重增長檢查
            const bmi = state.settings.w / ((state.settings.h / 100) ** 2);
            let limit = 0.45;
            if (bmi < 18.5) limit = 0.55;
            else if (bmi >= 24) limit = 0.3;
            
            const totalGain = state.settings.cw - state.settings.w;
            const avgGain = state.settings.week > 0 ? (totalGain / state.settings.week) : 0;
            
            const warn = document.getElementById('weight-warn');
            const card = document.getElementById('stat-card');
            if (state.settings.week > 12 && avgGain > limit) {
                warn.classList.remove('hidden');
                card.classList.add('pulse-warn');
            } else {
                warn.classList.add('hidden');
                card.classList.remove('pulse-warn');
            }
        }

        async function startAIPocess(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('ui-idle').classList.add('hidden');
            document.getElementById('ui-loading').classList.remove('hidden');
            document.getElementById('prev-img').classList.add('hidden');
            document.getElementById('ai-results').classList.add('hidden');

            const reader = new FileReader();
            reader.onload = async (evt) => {
                const base64 = evt.target.result.split(',')[1];
                document.getElementById('prev-img').src = evt.target.result;
                document.getElementById('prev-img').classList.remove('hidden');

                try {
                    await runGemini(base64);
                } catch (err) {
                    console.error("Gemini Error:", err);
                    updateTip("⚠️ 辨識暫時失效", "可能是 API 金鑰限制或網路不穩，請手動輸入食物熱量。", "#ef4444");
                } finally {
                    document.getElementById('ui-loading').classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        async function runGemini(base64) {
            // 嚴謹的系統 Prompt
            const prompt = `你是一位資深孕期營養師。分析照片，必須嚴格依照 JSON 格式回傳，不可有其他贅字：
            {
                "items": [{"name": "食物名", "cal": 熱量數字, "gi": "low/mid/high"}],
                "tip": "針對孕婦熱量與血糖平衡的專業建議(50字內)",
                "excess": true/false
            }`;

            // 實作指數退避的 Retry 機制
            const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                try {
                    const res = await fetch(url, options);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return res;
                } catch (err) {
                    if (retries <= 0) throw err;
                    await new Promise(r => setTimeout(r, backoff));
                    return fetchWithRetry(url, options, retries - 1, backoff * 2);
                }
            };

            const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: "image/png", data: base64 } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            const data = await response.json();
            const rawJson = data.candidates?.[0]?.content?.parts?.[0]?.text;
            const parsed = JSON.parse(rawJson);

            currentTempItems = parsed.items.map(i => ({ ...i, id: Date.now() + Math.random() }));
            renderTempList();
            updateTip(parsed.excess ? "🚨 營養師警示" : "✅ 營養師點評", parsed.tip, parsed.excess ? "#ef4444" : "#f472b6");
            document.getElementById('ai-results').classList.remove('hidden');
        }

        function renderTempList() {
            const box = document.getElementById('temp-items');
            box.innerHTML = currentTempItems.map(item => `
                <div class="bg-pink-50 border border-pink-100 px-4 py-2 rounded-2xl flex items-center gap-3 text-xs font-black">
                    <span class="text-pink-600">${item.name} <span class="opacity-50">${item.cal}k</span></span>
                    <button onclick="removeTempItem(${item.id})" class="text-pink-200">✕</button>
                </div>
            `).join('');
        }

        function removeTempItem(id) {
            currentTempItems = currentTempItems.filter(i => i.id !== id);
            renderTempList();
            if (currentTempItems.length === 0) document.getElementById('ai-results').classList.add('hidden');
        }

        function confirmMeal() {
            const type = document.getElementById('meal-type').value;
            state.meals[type].list.push(...currentTempItems);
            state.meals[type].sum = state.meals[type].list.reduce((s, i) => s + i.cal, 0);
            
            currentTempItems = [];
            document.getElementById('ai-results').classList.add('hidden');
            document.getElementById('prev-img').classList.add('hidden');
            document.getElementById('ui-idle').classList.remove('hidden');
            
            saveState();
        }

        function addManual() {
            const n = document.getElementById('man-name').value;
            const c = parseInt(document.getElementById('man-cal').value);
            if (!n || isNaN(c)) return;
            currentTempItems.push({ id: Date.now(), name: n, cal: c, gi: 'mid' });
            renderTempList();
            document.getElementById('ai-results').classList.remove('hidden');
            document.getElementById('man-name').value = '';
            document.getElementById('man-cal').value = '';
        }

        function calculateTDEE() {
            const { h, w, cw, week, activity } = state.settings;
            // Mifflin-St Jeor: BMR = 10*W + 6.25*H - 5*Age - 161 (Female)
            const bmr = (10 * w) + (6.25 * h) - (5 * 30) - 161;
            let base = bmr * activity;
            
            // 孕期補貼
            if (week >= 13 && week <= 28) base += 300;
            else if (week > 28) base += 450;
            
            state.targetCal = Math.round(base);
        }

        function saveSetup() {
            state.settings.h = parseFloat(document.getElementById('in-h').value) || 160;
            state.settings.w = parseFloat(document.getElementById('in-w').value) || 55;
            state.settings.cw = parseFloat(document.getElementById('in-cw').value) || 55;
            state.settings.week = parseInt(document.getElementById('in-week').value) || 1;
            state.settings.activity = parseFloat(document.getElementById('in-act').value);
            state.setup = true;
            calculateTDEE();
            saveState();
            document.getElementById('setup-screen').classList.add('hidden');
        }

        function updateTip(title, content, color) {
            document.getElementById('sug-title').innerText = title;
            document.getElementById('sug-body').innerText = content;
            document.getElementById('ai-suggestion').style.borderColor = color;
        }

        function showHistory() {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "今日食譜結算";
            
            let html = '';
            for (let [key, m] of Object.entries(state.meals)) {
                const label = { breakfast: '🌅 早餐', lunch: '☀️ 午餐', dinner: '🌙 晚餐' }[key];
                html += `
                    <div class="bg-gray-50 p-5 rounded-3xl">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-black text-gray-400 text-[10px] uppercase tracking-widest">${label}</span>
                            <span class="font-black text-pink-500">${m.sum} kcal</span>
                        </div>
                        <div class="space-y-2">
                            ${m.list.map(i => `
                                <div class="bg-white p-3 rounded-xl flex justify-between items-center shadow-sm">
                                    <span class="text-xs font-bold">${i.name} (${i.cal}k)</span>
                                    <button onclick="deleteSavedItem('${key}', ${i.id})" class="text-red-300 text-[10px] font-black">刪除</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            body.innerHTML = html || '<p class="text-center text-gray-300 py-10">尚無紀錄</p>';
            document.getElementById('modal-container').classList.remove('hidden');
        }

        function deleteSavedItem(type, id) {
            state.meals[type].list = state.meals[type].list.filter(i => i.id !== id);
            state.meals[type].sum = state.meals[type].list.reduce((s, i) => s + i.cal, 0);
            saveState();
            showHistory();
        }

        function openSettings() {
            const body = document.getElementById('modal-body');
            document.getElementById('modal-title').innerText = "更新孕期數據";
            body.innerHTML = `
                <div class="space-y-4">
                    <input id="up-cw" type="number" value="${state.settings.cw}" placeholder="目前體重" class="w-full bg-gray-50 p-4 rounded-2xl outline-none">
                    <input id="up-week" type="number" value="${state.settings.week}" placeholder="目前週數" class="w-full bg-gray-50 p-4 rounded-2xl outline-none">
                    <button onclick="updateHealthSettings()" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-black">保存修改</button>
                </div>
            `;
            document.getElementById('modal-container').classList.remove('hidden');
        }

        function updateHealthSettings() {
            state.settings.cw = parseFloat(document.getElementById('up-cw').value);
            state.settings.week = parseInt(document.getElementById('up-week').value);
            calculateTDEE();
            saveState();
            closeModal();
        }

        function resetData() {
            if (confirm("要清除今日的所有飲食記錄嗎？")) {
                state.meals = { breakfast: { list: [], sum: 0 }, lunch: { list: [], sum: 0 }, dinner: { list: [], sum: 0 } };
                saveState();
            }
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }

        window.onload = () => {
            if (!state.setup) document.getElementById('setup-screen').classList.remove('hidden');
            if (state.date !== new Date().toLocaleDateString()) {
                state.date = new Date().toLocaleDateString();
                state.meals = { breakfast: { list: [], sum: 0 }, lunch: { list: [], sum: 0 }, dinner: { list: [], sum: 0 } };
            }
            refreshUI();
        };
    </script>
</body>
</html>
