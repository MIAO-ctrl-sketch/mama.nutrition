<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>孕期 AI 智慧飲食助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #fdf2f4; -webkit-tap-highlight-color: transparent; }
        .card { border-radius: 28px; transition: all 0.3s ease; }
        .gradient-bg { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%); }
        .alert-glow { animation: alert-pulse 1.5s infinite; border: 2px solid #ef4444 !important; }
        @keyframes alert-pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .onboarding-screen { position: fixed; inset: 0; z-index: 100; background: white; overflow-y: auto; }
    </style>
</head>
<body class="pb-28">

    <!-- 1. 初始設置畫面 -->
    <div id="onboarding" class="onboarding-screen flex flex-col hidden">
        <div class="p-8 space-y-6">
            <h1 class="text-3xl font-black text-pink-600 mt-10">歡迎媽咪！💕</h1>
            <p class="text-gray-500 text-sm leading-relaxed">請輸入基本資料，系統將根據您的孕期週數與活動量計算每日目標與體重增長範圍。</p>
            
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400">身高 (cm)</label>
                        <input id="on-h" type="number" placeholder="160" class="w-full bg-gray-100 rounded-2xl p-4 mt-1 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400">孕前體重 (kg)</label>
                        <input id="on-w" type="number" placeholder="55" class="w-full bg-gray-100 rounded-2xl p-4 mt-1 outline-none">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-400">目前體重 (kg)</label>
                        <input id="on-cw" type="number" placeholder="56" class="w-full bg-gray-100 rounded-2xl p-4 mt-1 outline-none">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-400">孕期週數 (1-40)</label>
                        <input id="on-week" type="number" placeholder="12" class="w-full bg-gray-100 rounded-2xl p-4 mt-1 outline-none">
                    </div>
                </div>
                <div>
                    <label class="text-xs font-bold text-gray-400">日常活動量</label>
                    <select id="on-act" class="w-full bg-gray-100 rounded-2xl p-4 mt-1 outline-none appearance-none">
                        <option value="1.2">久坐不動 (辦公室工作)</option>
                        <option value="1.375" selected>輕量活動 (偶爾運動/做家事)</option>
                        <option value="1.55">中度活動 (規律運動習慣)</option>
                    </select>
                </div>
            </div>
            
            <button onclick="finishOnboarding()" class="w-full bg-pink-500 text-white py-5 rounded-2xl font-black shadow-lg shadow-pink-100">完成設置，開啟健康孕期</button>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto p-5 space-y-6">
        
        <!-- 頂部導航 -->
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-pink-600 tracking-tight">AI 孕媽咪助手</h1>
                <p id="current-date" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest"></p>
            </div>
            <div class="flex gap-2">
                <button onclick="exportData()" class="bg-white p-2 rounded-full shadow-sm text-blue-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </button>
                <button onclick="showModal('settings-modal')" class="bg-white p-2 rounded-full shadow-sm text-pink-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </button>
            </div>
        </header>

        <!-- 儀表板 -->
        <div id="main-dashboard" class="card gradient-bg p-6 text-white shadow-xl relative overflow-hidden">
            <div id="weight-alert-tag" class="hidden absolute top-0 left-0 right-0 bg-red-600 text-[10px] text-center py-1 font-black">⚠️ 體重異常警示：本週增長過快</div>
            <div class="mt-4 mb-6">
                <span class="text-xs opacity-80 block mb-1">今日總攝取量</span>
                <div class="flex items-baseline">
                    <span id="total-cal" class="text-5xl font-black">0</span>
                    <span class="ml-2 text-lg opacity-80">/ <span id="target-cal">1800</span> kcal</span>
                </div>
            </div>
            
            <div class="space-y-2">
                <div class="flex justify-between text-[10px] font-bold">
                    <span>早餐 <span id="b-c">0</span></span>
                    <span>午餐 <span id="l-c">0</span></span>
                    <span>晚餐 <span id="d-c">0</span></span>
                </div>
                <div class="h-3 bg-white/20 rounded-full flex overflow-hidden">
                    <div id="bar-b" class="bg-white rounded-full transition-all duration-700" style="width: 0%"></div>
                    <div id="bar-l" class="bg-white/70 rounded-full transition-all duration-700" style="width: 0%"></div>
                    <div id="bar-d" class="bg-white/40 rounded-full transition-all duration-700" style="width: 0%"></div>
                </div>
            </div>
        </div>

        <!-- AI 小提醒 -->
        <div id="ai-suggestion" class="card bg-white p-5 shadow-sm border-l-8 border-pink-400">
            <div class="flex gap-4">
                <div id="s-icon" class="text-3xl">🤰</div>
                <div class="flex-1">
                    <h3 id="s-title" class="font-bold text-gray-800 text-sm">媽咪智慧小提醒</h3>
                    <p id="s-body" class="text-xs text-gray-500 leading-relaxed mt-1">請開始錄入您的第一餐...</p>
                </div>
            </div>
        </div>

        <!-- 錄入區 -->
        <div class="card bg-white p-6 shadow-sm space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="font-black text-gray-700">錄入今日飲食</h2>
                <select id="meal-type" class="text-xs bg-pink-50 text-pink-600 font-bold px-3 py-2 rounded-xl border-none">
                    <option value="breakfast">早餐</option>
                    <option value="lunch" selected>午餐</option>
                    <option value="dinner">晚餐</option>
                </select>
            </div>

            <!-- 照片上傳 -->
            <label class="block relative cursor-pointer">
                <input type="file" accept="image/*" class="hidden" onchange="processAI(event)">
                <div id="upload-box" class="border-2 border-dashed border-pink-100 bg-pink-50/30 rounded-[32px] p-8 flex flex-col items-center justify-center min-h-[160px]">
                    <div id="upload-prompt" class="flex flex-col items-center">
                        <div class="bg-pink-500 text-white p-4 rounded-full shadow-lg mb-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" /></svg>
                        </div>
                        <p class="text-sm font-bold text-pink-600">拍照辨識熱量與 GI</p>
                    </div>
                    <div id="ai-loading" class="hidden flex flex-col items-center">
                        <div class="w-10 h-10 border-4 border-pink-200 border-t-pink-500 rounded-full animate-spin"></div>
                        <p class="text-xs text-pink-600 font-bold mt-3">AI 正在計算...</p>
                    </div>
                    <img id="meal-preview" class="hidden w-full h-40 object-cover rounded-2xl">
                </div>
            </label>

            <!-- 手動錄入 -->
            <div class="space-y-3">
                <div class="flex gap-2">
                    <input id="manual-name" type="text" placeholder="食物名稱" class="flex-1 bg-gray-50 rounded-xl px-4 py-3 text-sm outline-none">
                    <input id="manual-cal" type="number" placeholder="熱量" class="w-20 bg-gray-50 rounded-xl px-2 py-3 text-sm outline-none">
                    <button onclick="addManual()" class="bg-pink-100 text-pink-600 px-4 rounded-xl font-bold">加</button>
                </div>
                
                <div class="flex flex-wrap gap-2 py-1">
                    <button onclick="quickAdd('沙拉醬', 120, false)" class="text-[10px] bg-gray-100 px-2 py-1 rounded-lg text-gray-500">+ 沙拉醬</button>
                    <button onclick="quickAdd('沙茶醬', 110, false)" class="text-[10px] bg-gray-100 px-2 py-1 rounded-lg text-gray-500">+ 沙茶醬</button>
                    <button onclick="quickAdd('和風醬', 25, true)" class="text-[10px] bg-green-50 px-2 py-1 rounded-lg text-green-600 font-bold">+ 和風醬</button>
                </div>
            </div>

            <!-- 待存 -->
            <div id="pending-container" class="hidden border-t pt-4">
                <div id="pending-list" class="flex flex-wrap gap-2 mb-4"></div>
                <button onclick="saveMealData()" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-black shadow-lg">存入此餐，完成結算</button>
            </div>
        </div>

        <!-- 歷史詳情 -->
        <div id="history-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-6 z-[60] backdrop-blur-sm">
            <div class="bg-white rounded-[40px] w-full max-w-sm p-8 space-y-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-xl font-black">今日紀錄明細</h2>
                    <button onclick="resetToday()" class="text-red-500 text-xs font-bold">重設今日</button>
                </div>
                <div id="hist-list" class="space-y-4 max-h-[400px] overflow-y-auto pr-2 hide-scroll"></div>
                <button onclick="closeModal('history-modal')" class="w-full bg-gray-100 py-3 rounded-2xl font-bold text-gray-500">關閉</button>
            </div>
        </div>

        <!-- 設置彈窗 -->
        <div id="settings-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center p-6 z-[60]">
            <div class="bg-white rounded-[40px] w-full max-w-sm p-8 space-y-4">
                <h2 class="text-xl font-black text-pink-600">個人健康設置</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold">身高 (cm)</label>
                        <input id="set-h" type="number" class="w-full bg-gray-100 rounded-xl p-3 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold">孕前體重 (kg)</label>
                        <input id="set-w" type="number" class="w-full bg-gray-100 rounded-xl p-3 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold">目前體重 (kg)</label>
                        <input id="set-cw" type="number" class="w-full bg-gray-100 rounded-xl p-3 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-400 font-bold">週數 (1-40)</label>
                        <input id="set-week" type="number" class="w-full bg-gray-100 rounded-xl p-3 outline-none">
                    </div>
                </div>
                <button onclick="saveSettings()" class="w-full bg-pink-500 text-white py-4 rounded-2xl font-black">更新數據</button>
                <button onclick="closeModal('settings-modal')" class="w-full text-gray-400 text-xs">取消</button>
            </div>
        </div>

        <!-- 底部選單 -->
        <div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-white/95 p-3 rounded-[32px] shadow-2xl flex justify-around items-center z-50">
            <button onclick="showModal('gi-modal')" class="text-gray-400 flex flex-col items-center">
                <span class="text-xl">🥗</span>
                <span class="text-[9px] font-bold">低GI百科</span>
            </button>
            <button onclick="document.querySelector('input[type=file]').click()" class="bg-pink-500 text-white p-4 rounded-3xl -mt-10 shadow-xl border-4 border-white active:scale-90 transition-all">
                📸
            </button>
            <button onclick="showModal('history-modal')" class="text-gray-400 flex flex-col items-center">
                <span class="text-xl">📊</span>
                <span class="text-[9px] font-bold">今日結算</span>
            </button>
        </div>
    </div>

    <!-- 低 GI 知識 -->
    <div id="gi-modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center p-6 z-[60]">
        <div class="bg-white rounded-[40px] w-full max-w-sm p-8 space-y-4">
            <h2 class="text-2xl font-black text-green-600">低 GI 智慧指南 🥗</h2>
            <div class="space-y-3 overflow-y-auto max-h-80 pr-2 hide-scroll text-sm">
                <div class="bg-green-50 p-4 rounded-2xl">
                    <p class="font-bold text-green-700">✅ 推薦：低 GI</p>
                    <p class="text-xs text-green-600 mt-1">糙米、五穀麵、地瓜、芭樂、水煮蛋白。穩定血糖，減少體重過快增長。</p>
                </div>
                <div class="bg-red-50 p-4 rounded-2xl">
                    <p class="font-bold text-red-700">❌ 避開：高 GI</p>
                    <p class="text-xs text-red-600 mt-1">白米飯、精緻麵食、含糖飲料、油炸物、加工醬料。</p>
                </div>
            </div>
            <button onclick="closeModal('gi-modal')" class="w-full bg-gray-100 py-4 rounded-2xl font-bold text-gray-500">了解了</button>
        </div>
    </div>

    <script>
        const apiKey = ""; // 使用環境自動提供
        
        let state = JSON.parse(localStorage.getItem('pregnant_ai_v6')) || {
            isOnboarding: true,
            date: new Date().toLocaleDateString(),
            settings: { h: 160, w: 55, cw: 56, week: 12, activity: 1.375 },
            targetCal: 1800,
            meals: {
                breakfast: { items: [], total: 0 },
                lunch: { items: [], total: 0 },
                dinner: { items: [], total: 0 }
            }
        };

        let tempItems = [];

        function init() {
            // 每日重置
            if (state.date !== new Date().toLocaleDateString()) {
                state.meals = { breakfast: { items: [], total: 0 }, lunch: { items: [], total: 0 }, dinner: { items: [], total: 0 } };
                state.date = new Date().toLocaleDateString();
                save();
            }
            
            if (state.isOnboarding) {
                document.getElementById('onboarding').classList.remove('hidden');
            }

            document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-TW', { month: 'long', day: 'numeric', weekday: 'long' });
            
            // 同步設置彈窗
            document.getElementById('set-h').value = state.settings.h;
            document.getElementById('set-w').value = state.settings.w;
            document.getElementById('set-cw').value = state.settings.cw;
            document.getElementById('set-week').value = state.settings.week;
            
            updateUI();
            checkWeightHealth();
        }

        function save() {
            localStorage.setItem('pregnant_ai_v6', JSON.stringify(state));
        }

        function finishOnboarding() {
            const h = parseFloat(document.getElementById('on-h').value) || 160;
            const w = parseFloat(document.getElementById('on-w').value) || 55;
            const cw = parseFloat(document.getElementById('on-cw').value) || 56;
            const week = parseInt(document.getElementById('on-week').value) || 1;
            const act = parseFloat(document.getElementById('on-act').value);

            state.settings = { h, w, cw, week, activity: act };
            state.isOnboarding = false;
            calculateTDEE();
            document.getElementById('onboarding').classList.add('hidden');
            save();
            updateUI();
            checkWeightHealth();
        }

        function calculateTDEE() {
            const bmr = 655 + (9.6 * state.settings.w) + (1.8 * state.settings.h) - (4.7 * 30);
            let tdee = bmr * state.settings.activity;
            if (state.settings.week > 12) tdee += 300; 
            state.targetCal = Math.round(tdee);
        }

        function saveSettings() {
            state.settings.h = parseFloat(document.getElementById('set-h').value);
            state.settings.w = parseFloat(document.getElementById('set-w').value);
            state.settings.cw = parseFloat(document.getElementById('set-cw').value);
            state.settings.week = parseInt(document.getElementById('set-week').value);
            calculateTDEE();
            save();
            closeModal('settings-modal');
            updateUI();
            checkWeightHealth();
        }

        function checkWeightHealth() {
            const gain = state.settings.cw - state.settings.w;
            const avgGain = state.settings.week > 0 ? (gain / state.settings.week) : 0;
            const tag = document.getElementById('weight-alert-tag');
            const dashboard = document.getElementById('main-dashboard');

            // 孕中期後，週增重大於 0.5kg 視為過快
            if (state.settings.week > 12 && avgGain > 0.5) {
                tag.classList.remove('hidden');
                dashboard.classList.add('alert-glow');
                showSuggestion("🚨 體重警示", `目前週平均增長 ${avgGain.toFixed(2)}kg，增長速度略快。建議減少晚餐澱粉攝取。`, "alert");
            } else {
                tag.classList.add('hidden');
                dashboard.classList.remove('alert-glow');
            }
        }

        async function processAI(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (event) => {
                const base64 = event.target.result.split(',')[1];
                document.getElementById('meal-preview').src = event.target.result;
                document.getElementById('meal-preview').classList.remove('hidden');
                document.getElementById('upload-prompt').classList.add('hidden');
                document.getElementById('ai-loading').classList.remove('hidden');

                try {
                    await callGeminiAI(base64);
                } catch (err) {
                    showSuggestion("⚠️ 錯誤", "AI 目前忙碌中，請手動輸入食物熱量。", "alert");
                } finally {
                    document.getElementById('ai-loading').classList.add('hidden');
                }
            };
            reader.readAsDataURL(file);
        }

        async function callGeminiAI(base64) {
            const prompt = `你是一位孕期營養師。分析照片回傳 JSON：
            {
              "foods": [{"name": "名稱", "cal": 熱量, "gi": "low/mid/high"}],
              "tip": "針對孕婦熱量控制的代換建議"
            }`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: "image/png", data: base64 } }] }],
                    generationConfig: { responseMimeType: "application/json" }
                })
            });

            const res = await response.json();
            const data = JSON.parse(res.candidates[0].content.parts[0].text);

            tempItems = data.foods.map(f => ({ 
                name: f.name, 
                calories: f.cal, 
                isLowGI: f.gi === 'low',
                id: Date.now() + Math.random()
            }));
            
            renderTemp();
            showSuggestion("🥗 AI 分析結果", data.tip, "info");
            document.getElementById('pending-container').classList.remove('hidden');
        }

        function quickAdd(name, cal, gi) {
            tempItems.push({ name, calories: cal, isLowGI: gi, id: Date.now() + Math.random() });
            renderTemp();
            document.getElementById('pending-container').classList.remove('hidden');
        }

        function addManual() {
            const n = document.getElementById('manual-name').value;
            const c = parseInt(document.getElementById('manual-cal').value);
            if (!n || isNaN(c)) return;
            quickAdd(n, c, false);
            document.getElementById('manual-name').value = '';
            document.getElementById('manual-cal').value = '';
        }

        function renderTemp() {
            const container = document.getElementById('pending-list');
            container.innerHTML = tempItems.map((item, idx) => `
                <div class="bg-pink-50 border border-pink-100 px-3 py-1.5 rounded-xl flex items-center gap-2 text-xs">
                    <span class="font-bold">${item.name} (${item.calories}k)</span>
                    <button onclick="removeTemp(${idx})" class="text-pink-300">✕</button>
                </div>
            `).join('');
        }

        function removeTemp(idx) {
            tempItems.splice(idx, 1);
            renderTemp();
            if (tempItems.length === 0) document.getElementById('pending-container').classList.add('hidden');
        }

        function saveMealData() {
            const type = document.getElementById('meal-type').value;
            state.meals[type].items.push(...tempItems);
            state.meals[type].total = state.meals[type].items.reduce((s, i) => s + i.calories, 0);
            
            save();
            tempItems = [];
            updateUI();
            
            document.getElementById('pending-container').classList.add('hidden');
            document.getElementById('meal-preview').classList.add('hidden');
            document.getElementById('upload-prompt').classList.remove('hidden');

            if (state.meals[type].total > 700) {
                showSuggestion("⚠️ 熱量過高", `這餐熱量為 ${state.meals[type].total} 大卡。下一餐建議多吃一份深色葉菜，澱粉量減半以補償。`, "alert");
            }
        }

        function removeHistoryItem(mealType, itemId) {
            state.meals[mealType].items = state.meals[mealType].items.filter(i => i.id !== itemId);
            state.meals[mealType].total = state.meals[mealType].items.reduce((s, i) => s + i.calories, 0);
            save();
            updateUI();
        }

        function updateUI() {
            const total = state.meals.breakfast.total + state.meals.lunch.total + state.meals.dinner.total;
            document.getElementById('total-cal').innerText = total;
            document.getElementById('target-cal').innerText = state.targetCal;
            document.getElementById('b-c').innerText = state.meals.breakfast.total;
            document.getElementById('l-c').innerText = state.meals.lunch.total;
            document.getElementById('d-c').innerText = state.meals.dinner.total;

            document.getElementById('bar-b').style.width = Math.min((state.meals.breakfast.total / state.targetCal * 100), 100) + '%';
            document.getElementById('bar-l').style.width = Math.min((state.meals.lunch.total / state.targetCal * 100), 100) + '%';
            document.getElementById('bar-d').style.width = Math.min((state.meals.dinner.total / state.targetCal * 100), 100) + '%';

            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('hist-list');
            const sections = { breakfast: '🌅 早餐', lunch: '☀️ 午餐', dinner: '🌙 晚餐' };
            container.innerHTML = Object.keys(sections).map(s => `
                <div class="bg-gray-50 p-4 rounded-3xl">
                    <div class="flex justify-between items-center mb-2">
                        <span class="font-bold text-sm">${sections[s]}</span>
                        <span class="text-pink-500 font-bold text-xs">${state.meals[s].total} kcal</span>
                    </div>
                    <div class="space-y-1">
                        ${state.meals[s].items.map(i => `
                            <div class="flex justify-between text-[10px] bg-white p-2 rounded-lg">
                                <span>${i.name} (${i.calories}k)</span>
                                <button onclick="removeHistoryItem('${s}', ${i.id})" class="text-red-300">刪除</button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showSuggestion(title, body, type) {
            document.getElementById('s-title').innerText = title;
            document.getElementById('s-body').innerText = body;
            document.getElementById('s-icon').innerText = type === 'alert' ? '🚨' : '🤰';
        }

        function exportData() {
            const total = state.meals.breakfast.total + state.meals.lunch.total + state.meals.dinner.total;
            const content = [
                ['日期', '週數', '當前體重', '目標熱量', '今日攝取', '早餐', '午餐', '晚餐'],
                [state.date, state.settings.week, state.settings.cw, state.targetCal, total, state.meals.breakfast.total, state.meals.lunch.total, state.meals.dinner.total]
            ].map(e => e.join(",")).join("\n");
            
            const blob = new Blob(["\ufeff" + content], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.setAttribute("download", `孕期健檢紀錄_${state.date}.csv`);
            link.click();
        }

        function resetToday() {
            if(confirm("重設今日飲食紀錄？")) {
                state.meals = { breakfast: { items: [], total: 0 }, lunch: { items: [], total: 0 }, dinner: { items: [], total: 0 } };
                save();
                location.reload();
            }
        }

        function showModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        window.onload = init;
    </script>
</body>
</html>
